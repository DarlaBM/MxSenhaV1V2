<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="dark">
<title>MxSenha</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1c1c1e;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;color:#f2f2f7}

/* LOGIN */
.login{position:fixed;inset:0;z-index:999;background:#1c1c1e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 32px;padding-top:max(40px,env(safe-area-inset-top));padding-bottom:max(40px,env(safe-area-inset-bottom))}
.login.gone{display:none}
.login-logo{width:86px;height:86px;border-radius:18px;overflow:hidden;flex-shrink:0}
.login-logo img{width:100%;height:100%;object-fit:cover;display:block}
.login-title{font-size:26px;font-weight:700}
.login-field{width:100%;background:#2c2c2e;border-radius:13px;display:flex;align-items:center;padding:0 16px;height:56px;gap:10px;border:1.5px solid transparent;transition:border-color .2s}
.login-field.focus{border-color:#0a84ff}
.login-input{flex:1;font-size:22px;font-weight:600;border:none;outline:none;background:transparent;color:#f2f2f7;letter-spacing:6px;caret-color:transparent}
.login-input::placeholder{letter-spacing:0;font-size:16px;font-weight:400;color:#48484a}
.login-eye{background:none;border:none;color:#636366;font-size:20px;cursor:pointer;padding:4px;line-height:1}
.login-err{font-size:14px;color:#ff453a;min-height:18px;text-align:center}
.login-btn{width:100%;height:56px;border-radius:13px;background:#0a84ff;border:none;color:#fff;font-size:17px;font-weight:700;cursor:pointer}
.login-btn:active{opacity:.8}

/* APP */
.app{height:100dvh;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px)}
.header{display:flex;align-items:center;gap:8px;padding:10px 16px 8px;background:#2c2c2e;border-bottom:1px solid #3a3a3c;flex-shrink:0}
.hlogo{width:28px;height:28px;border-radius:6px;overflow:hidden;flex-shrink:0}
.hlogo img{width:100%;height:100%;object-fit:cover}
.htitle{font-size:17px;font-weight:600;flex:1}
.menu-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:6px}
.menu-btn span{display:block;width:22px;height:2px;background:#f2f2f7;border-radius:2px}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;display:flex;flex-direction:column;gap:12px}

/* Version */
.ver-bar{display:flex;background:#2c2c2e;border-radius:12px;padding:3px;border:1px solid #3a3a3c}
.ver-btn{flex:1;padding:10px;border-radius:10px;border:none;background:none;font-size:15px;font-weight:600;color:#636366;cursor:pointer;transition:all .2s}
.ver-btn.active{background:#0a84ff;color:#fff}

/* Fields */
.field-card{background:#2c2c2e;border-radius:13px;padding:12px 16px 14px;cursor:pointer}
.field-lbl{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.field-inp{width:100%;background:none;border:none;outline:none;color:#f2f2f7;font-size:32px;font-weight:300;font-family:inherit;padding:0;letter-spacing:1px;caret-color:transparent;cursor:pointer}
.field-inp::placeholder{color:#3a3a3c}
.field-inp:disabled{color:#3a3a3c;cursor:default}
input[type=tel]{-moz-appearance:textfield}
input[type=tel]::-webkit-inner-spin-button,input[type=tel]::-webkit-outer-spin-button{-webkit-appearance:none}

/* Options */
.sec-lbl{font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;padding:0 2px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{background:#2c2c2e;border:2px solid transparent;border-radius:13px;padding:16px 10px;color:#8e8e93;font-size:15px;font-weight:500;text-align:center;cursor:pointer;transition:all .15s;line-height:1.3;font-family:inherit}
.opt-btn.active{background:#1a2d4a;border-color:#0a84ff;color:#0a84ff;font-weight:600}
.opt-btn:active{opacity:.7}
.opt-btn.full{grid-column:1/-1}

/* Chave */
.chave-card{background:#000;border-radius:13px;padding:12px 16px 14px}
.chave-lbl{font-size:11px;font-weight:600;color:#3a3a3a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.chave-val{font-family:"Courier New",monospace;font-size:36px;font-weight:700;color:#00cc00;letter-spacing:2px;word-break:break-all;line-height:1.15;text-shadow:0 0 12px rgba(0,204,0,.25);min-height:44px}
.chave-val.empty{color:#1a1a1a;text-shadow:none}
.chave-val.err{color:#444;font-size:15px;letter-spacing:0;text-shadow:none}

/* Copy */
.copy-btn{width:100%;padding:15px;border-radius:13px;border:1px solid #3a3a3c;background:#2c2c2e;color:#8e8e93;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.copy-btn.on{background:#1a2d4a;border-color:#0a84ff;color:#0a84ff}
.copy-btn:active{opacity:.7;transform:scale(.98)}

/* Overlays */
.overlay{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.dropdown{position:absolute;top:58px;right:12px;background:#2c2c2e;border-radius:13px;overflow:hidden;min-width:180px;box-shadow:0 8px 28px rgba(0,0,0,.6);z-index:201}
.dd-item{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid #3a3a3c;cursor:pointer;font-size:16px;color:#f2f2f7}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:#3a3a3c}
.sheet{position:relative;z-index:201;width:100%;background:#1c1c1e;border-radius:20px 20px 0 0;display:flex;flex-direction:column;max-height:88dvh}
.sheet-handle{width:36px;height:4px;background:#3a3a3c;border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px;flex-shrink:0}
.sheet-title{font-size:18px;font-weight:600}
.sheet-close{background:none;border:none;color:#0a84ff;font-size:16px;cursor:pointer;padding:4px}
.sheet-body{flex:1;display:flex;flex-direction:column;padding:0 12px 20px;gap:8px;overflow-y:auto}
.help-row{background:#2c2c2e;border-radius:12px;padding:12px 14px}
.help-row-title{font-size:14px;font-weight:600;color:#f2f2f7;margin-bottom:4px}
.help-row-desc{font-size:13px;color:#8e8e93;line-height:1.4}

/* Lang sheet */
.lang-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 24px 28px;gap:16px}
.lang-opt{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:#2c2c2e;border:2px solid transparent;padding:16px 32px;border-radius:14px;transition:all .15s}
.lang-opt.active{border-color:#0a84ff}
.lang-opt:active{opacity:.7}
.lang-code{font-size:22px;font-weight:700;color:#f2f2f7;letter-spacing:1px}
.lang-name{font-size:13px;color:#8e8e93}

.toast{position:fixed;bottom:max(30px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="login-logo"><img id="logoLogin" alt="logo"></div>
  <div class="login-title">MxSenha</div>
  <div style="width:100%;display:flex;flex-direction:column;gap:12px">
    <div class="login-field" id="lf">
      <input class="login-input" type="password" id="li" placeholder="Senha de acesso" maxlength="24"
        onfocus="document.getElementById('lf').classList.add('focus')"
        onblur="document.getElementById('lf').classList.remove('focus')">
      <button class="login-eye" id="eyeBtn" onclick="toggleEye()">&#128065;</button>
    </div>
    <div class="login-err" id="lerr"></div>
    <button class="login-btn" id="lbtn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen" style="display:none">
  <div class="header">
    <div class="hlogo"><img id="logoHeader" alt=""></div>
    <span class="htitle">MxSenha</span>
    <button class="menu-btn" onclick="openMenu()"><span></span><span></span><span></span></button>
  </div>
  <div class="scroll">
    <div class="ver-bar">
      <button class="ver-btn active" id="bV1" onclick="setVer(1)">V1</button>
      <button class="ver-btn" id="bV2" onclick="setVer(2)">V2</button>
    </div>
    <div class="field-card" onclick="focusField('cod')">
      <div class="field-lbl" id="fCod">Código</div>
      <input class="field-inp" id="cod" type="tel" inputmode="numeric" maxlength="5" placeholder="0000" oninput="onCod()" autocomplete="off">
    </div>
    <div class="field-card" onclick="focusField('hrs')">
      <div class="field-lbl" id="fHrs">Horas</div>
      <input class="field-inp" id="hrs" type="tel" inputmode="numeric" maxlength="4" placeholder="0" oninput="calc()" autocomplete="off" disabled>
    </div>
    <div class="sec-lbl" id="fOpts">Opções de Chave</div>
    <div class="opts-grid" id="optsGrid"></div>
    <div class="chave-card">
      <div class="chave-lbl" id="fChave">Chave</div>
      <div class="chave-val empty" id="chaveVal">&mdash;</div>
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copiar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span id="copyTxt">Copiar Chave</span>
    </button>
  </div>
</div>

<!-- MENU -->
<div class="overlay" id="menuOv" onclick="closeAll()">
  <div class="backdrop"></div>
  <div class="dropdown" onclick="event.stopPropagation()">
    <div class="dd-item" onclick="openHelp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f2f2f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".8" fill="#f2f2f7" stroke="none"/></svg>
      <span id="miHelp">Ajuda</span>
    </div>
    <div class="dd-item" onclick="openLang()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f2f2f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span id="miLang">Idioma</span>
    </div>
  </div>
</div>

<!-- HELP -->
<div class="overlay" id="helpOv">
  <div class="backdrop" onclick="closeAll()"></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title" id="helpTitle">Ajuda</span>
      <button class="sheet-close" onclick="closeAll()" id="hClose">Fechar</button>
    </div>
    <div class="sheet-body" id="helpBody"></div>
  </div>
</div>

<!-- LANG -->
<div class="overlay" id="langOv">
  <div class="backdrop" onclick="closeAll()"></div>
  <div class="sheet" style="max-height:50dvh">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title" id="langTitle">Idioma</span>
      <button class="sheet-close" onclick="closeAll()" id="lClose">Fechar</button>
    </div>
    <div class="lang-body">
      <button class="lang-opt active" id="bPT" onclick="setLang('pt')">
        <span class="lang-code">PT</span>
        <span class="lang-name">Português</span>
      </button>
      <button class="lang-opt" id="bEN" onclick="setLang('en')">
        <span class="lang-code">EN</span>
        <span class="lang-name">English</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function doLogin(){
  var val = document.getElementById("li").value;
  if(val === PWD){
    document.getElementById("loginScreen").classList.add("gone");
    document.getElementById("appScreen").style.display = "";
  } else {
    var e = document.getElementById("lerr");
    e.textContent = TX[lang].lerr;
    document.getElementById("li").value = "";
    setTimeout(function(){ e.textContent=""; }, 2500);
  }
}
function toggleEye(){
  var i = document.getElementById("li");
  i.type = i.type === "password" ? "text" : "password";
}

function calcV1(C, op, h){
  var base = C * ((C>>8) + (C&255)) * 256;
  if(op===2) return base + 111;
  if(op===3) return base + Math.floor(h/10);
  return base;
}
function calcV2(C, op, h){
  var low=C&255, high=C>>8;
  var rw = (high+low)*C;
  var hw = ((rw | ((rw & 0xF0000)>>4)) & 0x7FFF);
  var base = hw * 65536;
  if(op===3) return base + h;
  if(op===4) return base + 3;
  return base + op;
}

function focusField(id){
  var el = document.getElementById(id);
  if(!el.disabled){ el.focus(); }
}

    btn.className = "opt-btn" + (selOp===i ? " active" : "") + (i===4 ? " full" : "");
    btn.textContent = opts[i];
    (function(idx){ btn.onclick = function(){ selectOp(idx); }; })(i);
    grid.appendChild(btn);
  }
}

function selectOp(i){
  selOp = i;
  buildGrid();
  var hEl = document.getElementById("hrs");
  var isHab = (i===3);
  hEl.disabled = !isHab;
  if(!isHab) hEl.value = "";
  calc();
}

function onCod(){
  var el = document.getElementById("cod");
  el.value = el.value.replace(/[^0-9]/g,"").slice(0,5);
  calc();
}
function calc(){
  var t = TX[lang];
  var C = parseInt(document.getElementById("cod").value) || 0;
  var h = parseInt(document.getElementById("hrs").value) || 0;
  var cv = document.getElementById("chaveVal");
  var cb = document.getElementById("copyBtn");
  if(selOp===null || !C){
    cv.textContent="\u2014"; cv.className="chave-val empty"; cb.className="copy-btn"; return;
  }
  if(C<256){
    cv.textContent=t.codMin; cv.className="chave-val err"; cb.className="copy-btn"; return;
  }
  if(selOp===3 && !h){
    cv.textContent="\u2014"; cv.className="chave-val empty"; cb.className="copy-btn"; return;
  }
  var res = (ver===1 ? calcV1 : calcV2)(C, selOp, h);
  cv.textContent = res; cv.className="chave-val"; cb.className="copy-btn on";
}

function setVer(v){
  ver=v; selOp=null;
  document.getElementById("bV1").classList.toggle("active",v===1);
  document.getElementById("bV2").classList.toggle("active",v===2);
  document.getElementById("cod").value="";
  document.getElementById("hrs").value="";
  document.getElementById("hrs").disabled=true;
  var cv=document.getElementById("chaveVal");
  cv.textContent="\u2014"; cv.className="chave-val empty";
  document.getElementById("copyBtn").className="copy-btn";
  buildGrid();
}

function copiar(){
  var v = document.getElementById("chaveVal").textContent;
  if(!v || v==="\u2014") return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(v).then(function(){ showToast(TX[lang].copied); });
  } else {
    var ta=document.createElement("textarea");
    ta.value=v; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    showToast(TX[lang].copied);
  }
}
function showToast(m){
  var t=document.getElementById("toast");
  t.textContent=m; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2000);
}

function openMenu(){ document.getElementById("menuOv").classList.add("open"); }
function openHelp(){
  closeAll();
  var items = (ver===1 ? TX[lang].v1 : TX[lang].v2).help;
  var html="";
  for(var i=0;i<items.length;i++){
    html+='<div class="help-row"><div class="help-row-title">'+items[i].t+'</div><div class="help-row-desc">'+items[i].d+'</div></div>';
  }
  document.getElementById("helpBody").innerHTML=html;
  document.getElementById("helpOv").classList.add("open");
}
function openLang(){ closeAll(); document.getElementById("langOv").classList.add("open"); }
function closeAll(){
  ["menuOv","helpOv","langOv"].forEach(function(id){ document.getElementById(id).classList.remove("open"); });
}
function setLang(l){
  lang=l;
  document.getElementById("bPT").classList.toggle("active",l==="pt");
  document.getElementById("bEN").classList.toggle("active",l==="en");
  applyTx(); closeAll();
}
function applyTx(){
  var t=TX[lang];
  document.getElementById("fCod").textContent=t.fCod;
  document.getElementById("fHrs").textContent=t.fHrs;
  document.getElementById("fOpts").textContent=t.fOpts;
  document.getElementById("fChave").textContent=t.fChave;
  document.getElementById("copyTxt").textContent=t.copyTxt;
  document.getElementById("miHelp").textContent=t.miHelp;
  document.getElementById("miLang").textContent=t.miLang;
  document.getElementById("helpTitle").textContent=t.helpTitle;
  document.getElementById("hClose").textContent=t.hClose;
  document.getElementById("langTitle").textContent=t.langTitle;
  document.getElementById("lClose").textContent=t.lClose;
  document.getElementById("lbtn").textContent=t.lbtn;
  document.getElementById("li").placeholder=t.lph;
  buildGrid(); calc();
}
buildGrid();
applyTx();
</script>
</body>
</html>
